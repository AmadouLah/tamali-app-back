# =================== CONFIGURATION RENDER ===================

server.port=${PORT:10000}
server.address=0.0.0.0

# --- Base de données ---
spring.datasource.url=${DB_URL:?DB_URL manquant (variable d'environnement Render)}
spring.datasource.username=${DB_USERNAME:?DB_USERNAME manquant (variable d'environnement Render)}
spring.datasource.password=${DB_PASSWORD:?DB_PASSWORD manquant (variable d'environnement Render)}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# --- CORS ---
# https://*.vercel.app pour les previews Vercel + tamali.vercel.app en prod
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://tamali.vercel.app,https://*.vercel.app,http://localhost:4200}

# --- JWT ---
app.jwt.secret=${JWT_SECRET:?JWT_SECRET manquant (variable d'environnement Render)}
app.jwt.expiration=86400000

# --- Email (Brevo) ---
app.mail.provider=${APP_MAIL_PROVIDER:brevo}
app.mail.from=${APP_MAIL_FROM:amadoulandoure004@gmail.com}
app.mail.brevo.api-key=${BREVO_API_KEY}

# --- OAuth2 Google ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:https://tamali-app-back.onrender.com}/api/auth/oauth2/callback/google

# --- URLs ---
app.base-url=${APP_BASE_URL:https://tamali-app-back.onrender.com}
app.frontend-url=${APP_FRONTEND_URL:https://tamali.vercel.app/}

# --- Web Push (VAPID) — WEBPUSH_VAPID_* sur Render pour notifications app fermée ---
app.webpush.vapid-public-key=${WEBPUSH_VAPID_PUBLIC_KEY:}
app.webpush.vapid-private-key=${WEBPUSH_VAPID_PRIVATE_KEY:}
app.webpush.subject=${WEBPUSH_SUBJECT:mailto:amadoulandoure004@gmail.com}

# --- Supabase Storage ---
app.storage.supabase.url=${SUPABASE_URL:https://hizqylwmjconaqfvbqbt.supabase.co}
app.storage.supabase.bucket=${SUPABASE_BUCKET:receipt}
app.storage.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.storage.supabase.key=${SUPABASE_KEY:}

# --- Optimisation mémoire ---
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=100
server.tomcat.accept-count=10
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# --- Désactivation des métriques inutiles ---
spring.jmx.enabled=false
management.metrics.enable.jvm=false
management.metrics.enable.process=false
management.metrics.enable.system=false
management.endpoints.web.exposure.include=health

# --- Logging ---
logging.level.root=ERROR
logging.level.com.tamali_app_back=INFO
logging.level.com.tamali_app_back.www.config=DEBUG
